services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-api-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ticket_system}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ticket_system}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-api
    ports:
      - "${API_PORT:-5162}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-ticket_system};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Secret: ${JWT_SECRET:-dev-secret-key-change-me-in-production-32chars!}
      Jwt__Issuer: TicketSystem
      Jwt__Audience: TicketSystem
      BusinessTimeZone__Id: Africa/Addis_Ababa
      MobileClient__ClientId: ticket-counter
      MobileClient__SharedKey: ${MOBILE_CLIENT_SHARED_KEY:-dev-mobile-client-key}
      MobileClient__Enforce: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
